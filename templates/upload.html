<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завантаження датасету</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; padding: 30px; margin: 0; }
        .container { max-width: 600px; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin: 0 auto; text-align: center; }
        h2 { color: #34a853; }
        input[type="file"] { margin: 20px 0; padding: 10px; border: 1px dashed #34a853; width: 100%; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #34a853; border: none; color: white; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2d8e47; }
        #back-link { display: block; margin-bottom: 20px; text-align: left; color: #1a73e8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <a id="back-link" href="/">← На головну</a>
    <h2>Завантаження датасету для прогнозу</h2>
    <p>Оберіть CSV-файл із даними клієнтів (модель автоматично прорахує ризики для кожного рядка).</p>
    
    <form id="uploadForm">
        <input type="file" id="datasetFile" accept=".csv" required>
        <button type="submit">Обробити файл моделлю</button>
    </form>
    
    <div id="result" style="margin-top: 20px; font-weight: bold;"></div>
</div>

<script>
document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fileInput = document.getElementById('datasetFile');
    const resultDiv = document.getElementById('result');
    
    if (fileInput.files.length === 0) return;
    
    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    
    resultDiv.innerText = "Файл обробляється... Зачекайте.";
    
    try {
        const response = await fetch('http://127.0.0.1:8000/upload-csv', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        if (data.status === "success") {
            
            // Базова статистика
            let htmlContent = `
                <div style="padding: 15px; border-radius: 6px; background: #e6f4ea; color: #137333; margin-bottom: 20px; font-weight: bold;">
                    ✅ Успішно оброблено рядків: ${data.processed_rows}<br>
                    ⚠️ Знайдено потенційних відтоків: ${data.churn_count}
                </div>
            `;
            if (data.churn_count > 0 && data.top_factors && data.top_factors.length > 0) {
                htmlContent += `
                    <div style="background: #fff8e1; border: 1px solid #ffe082; padding: 20px; border-radius: 8px; margin-bottom: 25px;">
                        <h3 style="margin-top:0; color: #b78103;">💡 Головні драйвери відтоку в цьому датасеті:</h3>
                        <ul style="padding-left: 20px; margin-bottom: 0;">
                `;
                
                data.top_factors.forEach(factor => {
                    htmlContent += `
                        <li style="margin-bottom: 10px;">
                            <strong style="color: #795548;">${factor.factor}:</strong> <span style="color: #555;">${factor.impact}</span>
                        </li>
                    `;
                });
                
                htmlContent += `
                        </ul>
                    </div>
                `;
            }
            // Якщо є клієнти на відтік — будуємо таблицю
            if (data.churn_count > 0) {
                htmlContent += `
                    <h3>📋 Список клієнтів у зоні ризику (відсортовано за загрозою):</h3>
                    <table border="1" cellpadding="8" style="width:100%; border-collapse: collapse; text-align: left; background: white;">
                        <tr style="background-color: #fce8e6; color: #a51d24;">
                            <th>ID Клієнта</th>
                            <th>Ймовірність відтоку</th>
                        </tr>
                `;
                
                data.churn_list.forEach(customer => {
                    htmlContent += `
                        <tr>
                            <td><strong>${customer.id}</strong></td>
                            <td style="color: red; font-weight: bold;">${customer.probability}%</td>
                        </tr>
                    `;
                });
                
                htmlContent += `</table>`;
            } else {
                htmlContent += `<p style="color: green; font-weight: bold;">🎉 Чудово! Жоден клієнт із цього списку не збирається йти.</p>`;
            }
            
            resultDiv.innerHTML = htmlContent;
            
        } else {
            throw new Error(data.detail);
        }
    } catch (err) {
        resultDiv.innerHTML = `<div style="color: red; font-weight: bold;">❌ Помилка: ${err.message}</div>`;
    }
});
</script>
</body>
</html>
